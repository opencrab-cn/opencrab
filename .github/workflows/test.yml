name: Test and Lint

on:
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 类型检查
        run: npm run typecheck
      
      - name: ESLint 检查
        run: npm run lint
      
      - name: 运行测试
        run: npm test || true  # 临时允许失败
      
      - name: 构建检查
        run: |
          npx tsc -p tsconfig.main.json
          npx vite build
